<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منفذ أوامر Gemini المباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');
        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .code-preview {
            background: #1e293b;
            border-right: 4px solid #3b82f6;
            font-family: monospace;
            direction: ltr;
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-3xl bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 flex flex-col overflow-hidden h-[90vh]">
        
        <!-- Header -->
        <div class="p-5 border-b border-slate-700 bg-slate-900 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-500 rounded-lg animate-pulse">
                    <i class="fas fa-code text-white"></i>
                </div>
                <h1 class="font-bold text-lg">منفذ الأكواد اللحظي</h1>
            </div>
            <div id="connectionStatus" class="text-xs text-green-400 flex items-center gap-2">
                <span class="w-2 h-2 bg-green-400 rounded-full"></span> جاهز للاستلام
            </div>
        </div>

        <!-- Chat Log -->
        <div id="chatLog" class="flex-1 overflow-y-auto p-6 space-y-4">
            <div class="bg-slate-700/50 p-4 rounded-2xl rounded-tr-none text-sm border border-slate-600">
                مرحباً! جرب الآن أن تطلب مني: <strong>"اعمل تنبيه alert مكتوب فيه تم الاختراق"</strong> أو <strong>"غير لون الخلفية للأحمر"</strong>.
            </div>
        </div>

        <!-- System Message / Code Preview -->
        <div id="codeDisplay" class="hidden px-6 py-3 code-preview text-xs overflow-x-auto whitespace-pre"></div>

        <!-- Input -->
        <div class="p-4 bg-slate-900">
            <form id="actionForm" class="flex gap-2">
                <input 
                    type="text" 
                    id="userPrompt" 
                    placeholder="اكتب أمرك البرمجي هنا..." 
                    class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm"
                >
                <button type="submit" id="btnSend" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-bold transition-all">
                    <i class="fas fa-bolt"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        const apiKey = ""; // اتركها فارغة للبيئة التلقائية
        const modelName = "gemini-2.5-flash-preview-09-2025";
        
        const chatLog = document.getElementById('chatLog');
        const userPrompt = document.getElementById('userPrompt');
        const codeDisplay = document.getElementById('codeDisplay');
        const btnSend = document.getElementById('btnSend');

        function addLog(text, isUser = false) {
            const div = document.createElement('div');
            div.className = isUser ? "flex justify-end" : "flex justify-start";
            div.innerHTML = `<div class="${isUser ? 'bg-blue-600' : 'bg-slate-700'} p-3 rounded-2xl max-w-[85%] text-sm shadow-md">${text}</div>`;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        async function callGemini(prompt) {
            const systemMsg = `
            You are a direct browser controller.
            IF the user wants an action, YOU MUST return the JavaScript code inside [ACTION]...[/ACTION].
            Example: [ACTION] alert('Hello'); [/ACTION]
            Keep explanations very short and in Arabic.
            `;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemMsg }] }
                })
            });

            if (!response.ok) throw new Error("فشل في استلام البيانات من الخادم");
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        document.getElementById('actionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = userPrompt.value.trim();
            if (!msg) return;

            addLog(msg, true);
            userPrompt.value = '';
            btnSend.disabled = true;
            btnSend.innerHTML = '<i class="fas fa-spinner animate-spin"></i>';

            try {
                const response = await callGemini(msg);
                
                // البحث عن الوسم التنفيذي
                const match = response.match(/\[ACTION\]([\s\S]*?)\[\/ACTION\]/);
                
                if (match) {
                    const jsCode = match[1].trim();
                    
                    // إظهار الكود للمعاينة
                    codeDisplay.innerText = "// جاري التنفيذ:\n" + jsCode;
                    codeDisplay.classList.remove('hidden');

                    try {
                        // محاولة تنفيذ الكود بطريقتين لضمان العمل
                        const execute = new Function(jsCode);
                        execute();
                        
                        // للتأكيد في الـ Console
                        console.log("Executed JS:", jsCode);
                    } catch (err) {
                        addLog("خطأ في تنفيذ الكود: " + err.message);
                    }
                }

                const cleanText = response.replace(/\[ACTION\][\s\S]*?\[\/ACTION\]/g, '').trim();
                if (cleanText) addLog(cleanText);

            } catch (err) {
                addLog("حدث خطأ: " + err.message);
            } finally {
                btnSend.disabled = false;
                btnSend.innerHTML = '<i class="fas fa-bolt"></i>';
            }
        });
    </script>
</body>
</html>
