<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحرك المباشر - Gemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            max-width: 85%;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background-color: #3b82f6;
            color: white;
            align-self: flex-end;
            border-bottom-left-radius: 4px;
        }

        .ai-msg {
            background-color: #f1f5f9;
            color: #334155;
            align-self: flex-start;
            border-bottom-right-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        .code-preview {
            background: #0f172a;
            color: #10b981;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 8px;
            direction: ltr;
            text-align: left;
            display: none; /* مخفي افتراضياً لتبسيط الواجهة */
        }

        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .input-box {
            display: flex;
            background: #f1f5f9;
            border-radius: 999px;
            padding: 5px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        
        .input-box:focus-within {
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 20px;
            outline: none;
            color: #334155;
        }

        .send-btn {
            background: #3b82f6;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
        }

        .send-btn:active {
            transform: scale(0.9);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-white">
            <div class="font-bold flex items-center gap-2 text-slate-700">
                <i class="fas fa-bolt text-blue-500"></i>
                التنفيذ السريع
            </div>
            <div class="text-xs text-slate-500 flex items-center gap-2">
                <span class="status-dot"></span> متصل
            </div>
        </div>

        <!-- Messages -->
        <div id="messages" class="messages">
            <div class="msg-bubble ai-msg">
                أهلاً! أنا جاهز لتنفيذ أوامرك البرمجية فوراً في هذه الصفحة. اطلب ما تشاء.
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <form id="chatForm" class="input-box">
                <input type="text" id="userInput" placeholder="اطلب أمر (مثلاً: غير لون الخلفية)..." autocomplete="off" autofocus>
                <button type="submit" id="sendBtn" class="send-btn">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyBcwF991AVopxXwmBXTzvXeHPcCAbcI3r8";
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent";

        const messages = document.getElementById('messages');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function appendMessage(text, isUser = false, jsCode = null) {
            const div = document.createElement('div');
            div.className = `msg-bubble ${isUser ? 'user-msg' : 'ai-msg'}`;
            
            let content = text;
            
            // إضافة زر صغير لإظهار الكود إذا أردت رؤيته
            if (jsCode) {
                content += `
                    <div class="mt-2 text-[10px] text-blue-500 cursor-pointer hover:underline" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'block' ? 'none' : 'block'">
                        <i class="fas fa-code"></i> عرض الكود المنفذ
                    </div>
                    <div class="code-preview">${jsCode}</div>
                `;
            }
            
            div.innerHTML = content;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        async function processCommand(prompt) {
            const systemRule = `
            You are a direct, invisible JS executor. 
            User asks for an action in the browser. You MUST provide ONLY the JS code wrapped in [EXEC] and [/EXEC].
            Keep your text response to a maximum of 2-3 words in Arabic (e.g., "تم التنفيذ", "تم تغيير اللون").
            `;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-goog-api-key": API_KEY
                    },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemRule + "\nUSER: " + prompt }] }]
                    })
                });

                if (!response.ok) throw new Error("فشل الاتصال");

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                // البحث عن الكود
                const codeMatch = aiResponse.match(/\[EXEC\]([\s\S]*?)\[\/EXEC\]/);
                let codeToRun = null;

                if (codeMatch) {
                    codeToRun = codeMatch[1].trim();
                    try {
                        // التنفيذ السريع
                        new Function(codeToRun)();
                    } catch (e) {
                        console.error("Error executing:", e);
                        return { text: "حدث خطأ أثناء التنفيذ.", code: codeToRun };
                    }
                }

                const cleanText = aiResponse.replace(/\[EXEC\][\s\S]*?\[\/EXEC\]/g, '').trim();
                return { text: cleanText || "تم.", code: codeToRun };

            } catch (err) {
                return { text: "عذراً، فشل الاتصال.", code: null };
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            userInput.value = '';
            
            // تغيير شكل الزر ليدل على التحميل
            const originalIcon = sendBtn.innerHTML;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            sendBtn.style.background = '#94a3b8';
            userInput.disabled = true;

            const result = await processCommand(text);
            appendMessage(result.text, false, result.code);

            // إعادة الزر لشكله الطبيعي
            sendBtn.innerHTML = originalIcon;
            sendBtn.style.background = '#3b82f6';
            userInput.disabled = false;
            userInput.focus();
        });
    </script>
</body>
</html>
